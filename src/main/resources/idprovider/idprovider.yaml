kind: "IdProvider"
mode: "MIXED"
form:
  - type: "FieldSet"
    label: "Client"
    items:
      - type: "TextLine"
        name: "appDomain"
        label: "Domain"
        helpText: "Copy the field \"Domain\" from your Auth0 client settings."
        occurrences:
          min: 1
          max: 1
      - type: "TextLine"
        name: "appClientId"
        label: "Client ID"
        helpText: "Copy the field \"Client ID\" from your Auth0 client settings."
        occurrences:
          min: 1
          max: 1
      - type: "TextLine"
        name: "appSecret"
        label: "Client secret"
        helpText: "Copy the field \"Client Secret\" from your Auth0 client settings."
        occurrences:
          min: 1
          max: 1

  - type: "FieldSet"
    label: "Groups"
    items:
      - type: "PrincipalSelector"
        name: "defaultPrincipals"
        label: "Groups"
        helpText: "Groups automatically associated to new users."
        occurrences:
          min: 0
          max: 0
        principalType: "GROUP"

  - type: "FieldSet"
    label: "Widget options"
    items:
      - type: "FieldSet"
        label: "Display"
        items:
          - type: "TextLine"
            name: "allowedConnections"
            label: "Allowed connections"
            helpText: "Connections displayed by the widget. Defaults to all enabled connections. Examples: Username-Password-Authentication, github."
            occurrences:
              min: 0
              max: 0
          - type: "CheckBox"
            name: "displayAvatar"
            label: "Display avatar"
            helpText: "Whether or not the user avatar and display name is fetched from Gravatar and display in the widget header."
            occurrences:
              min: 0
              max: 1
            default: "checked"
          - type: "ComboBox"
            name: "language"
            label: "Language"
            helpText: "Language of the widget."
            occurrences:
              min: 1
              max: 1
            options:
              - value: "pt-br"
                label: "Brazilian Portuguese"
              - value: "ca"
                label: "Catalan"
              - value: "zh"
                label: "Chinese"
              - value: "cs"
                label: "Czech"
              - value: "da"
                label: "Danish"
              - value: "nl"
                label: "Dutch"
              - value: "en"
                label: "English"
              - value: "fr"
                label: "French"
              - value: "de"
                label: "German"
              - value: "hu"
                label: "Hungarian"
              - value: "it"
                label: "Italian"
              - value: "nb"
                label: "Norwegian Bokmål"
              - value: "pl"
                label: "Polish"
              - value: "ru"
                label: "Russian"
              - value: "es"
                label: "Spanish"
              - value: "sv"
                label: "Swedish"
              - value: "zh-tw"
                label: "Taiwanese Mandarin"
              - value: "tr"
                label: "Turkish"
              - value: "vi"
                label: "Vietnamese"
            default: "en"
          - type: "TextLine"
            name: "title"
            label: "Title"
            helpText: "Title of the widget"
            occurrences:
              min: 1
              max: 1
            default: "Auth0"

      - type: "FieldSet"
        label: "Theme"
        items:
          - type: "CheckBox"
            name: "labeledSubmitButton"
            label: "Labelled submit button"
            helpText: "Whether or not the submit button should have a label. When unchecked, an icon will be shown instead."
            occurrences:
              min: 0
              max: 1
            default: "checked"
          - type: "TextLine"
            name: "logo"
            label: "Logo URL"
            helpText: "Image URL that will be placed in the widget's header. Defaults to Auth0's logo"
            occurrences:
              min: 0
              max: 1
          - type: "TextLine"
            name: "primaryColor"
            label: "Primary color"
            helpText: "Primary color of the widget. Defaults to #ea5323."
            occurrences:
              min: 0
              max: 1

      - type: "FieldSet"
        label: "Social"
        items:
          - type: "ComboBox"
            name: "socialButtonStyle"
            label: "Social button style"
            helpText: "Size of the buttons for the social providers."
            occurrences:
              min: 1
              max: 1
            options:
              - value: "small"
                label: "Small"
              - value: "big"
                label: "Big"
            default: "small"

      - type: "FieldSet"
        label: "Database"
        items:
          - type: "CheckBox"
            name: "allowLogin"
            label: "Allow login"
            helpText: "When unchecked, the widget won't display the login screen"
            occurrences:
              min: 0
              max: 1
            default: "checked"
          - type: "CheckBox"
            name: "allowForgotPassword"
            label: "Allow forgot password"
            helpText: "When unchecked, the widget won't display the \"Don't remember your password?\" link"
            occurrences:
              min: 0
              max: 1
            default: "checked"
          - type: "CheckBox"
            name: "allowSignUp"
            label: "Allow signup"
            helpText: "When unchecked, the widget won't display the signup screen."
            occurrences:
              min: 0
              max: 1
            default: "checked"
          - type: "ComboBox"
            name: "initialScreen"
            label: "Initial screen"
            helpText: "Name of the screen that will be shown when the widget is opened."
            occurrences:
              min: 1
              max: 1
            options:
              - value: "login"
                label: "Login"
              - value: "signUp"
                label: "Sign Up"
              - value: "forgotPassword"
                label: "Forgot Password"
            default: "login"
          - type: "CheckBox"
            name: "loginAfterSignUp"
            label: "Login after sign up"
            helpText: "Whether or not the user will be signed in after a successful sign up."
            occurrences:
              min: 0
              max: 1
            default: "checked"
